/limo_control:
  ros__parameters:
    default_speed: 0.3
    p_gain: 0.01
    # If you don't run a lidar (/scan) -> limo_e_stop can't publish e_stop,
    # so set enable_estop: false to allow motion for lane tests.
    enable_estop: true
    estop_timeout_s: 0.5
    # If you are using ackermann base driver, enable this.
    publish_ackermann: false
    ack_cmd_topic: /limo/ack_cmd
    # steering_angle = (gap * p_gain) * steering_gain
    steering_gain: 1.0
    use_sim_time: false

